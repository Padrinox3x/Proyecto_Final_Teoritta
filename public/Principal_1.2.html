</head>

<body>

   <ul>

      </ul>

<div class="top-bar">
    <input type="text" id="search" placeholder="Buscar...">
    
    <select id="rows">
        <option value="5">5</option>
        <option value="10" selected>10</option>
        <option value="15">15</option>
    </select>

    <button class="btn-add" onclick="openModal()">+</button>
</div>

<table>
<thead>
<tr>
    <th>Nombre Proveedor</th>
    <th>Apellidos Proveedor</th>
    <th>Teléfono</th>
    <th>Correo</th>
    <th>Acciones</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div class="pagination">
    <button onclick="firstPage()">⏮</button>
    <button onclick="prevPage()">◀</button>
    
    <span id="pageInfo"></span>
    
    <button onclick="nextPage()">▶</button>
    <button onclick="lastPage()">⏭</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Registrar Proveedor</h3>
        <input id="nombreProveedor" placeholder="Nombre Proveedor">
        <input id="ApellidosProveedor" placeholder="Apellidos Proveedor">
        <input id="Correo"  placeholder="Correo">
        <input id="Telefono" type="number" placeholder="Telefono">        
        <button onclick="save()">Guardar</button>
        <button onclick="closeModal()">Cancelar</button>
    </div>
</div>

<script src="breadcrumb.js"></script>
<script src="menu.js"></script>

<script>
let data = JSON.parse(localStorage.getItem("proveedores")) || [];
let page = 1;
let rows = 10;
let editIndex = null;

/* GUARDAR EN STORAGE */
function persist(){
    localStorage.setItem("proveedores", JSON.stringify(data));
}

/* TOTAL PAGINAS */
function totalPages(filteredLength){
    return Math.ceil(filteredLength / rows) || 1;
}

/* FILTRO */
function getFilteredData(){
    let search = document.getElementById("search").value.toLowerCase();

    return data.filter(d =>
        d.nombreProveedor.toLowerCase().includes(search) ||
        d.apellidosProveedor.toLowerCase().includes(search) ||
        d.correo.toLowerCase().includes(search) ||
        d.telefono.toString().includes(search)
    );
}

/* RENDER */
function render(){
    let tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    let filtered = getFilteredData();

    let start = (page-1)*rows;
    let paginated = filtered.slice(start, start+rows);

    paginated.forEach((d,i)=>{
        tbody.innerHTML += `
        <tr>
            <td>${d.nombreProveedor}</td>
            <td>${d.apellidosProveedor}</td>
            <td>${d.telefono}</td>
            <td>${d.correo}</td>
            <td>
                <button class="btn-edit" onclick="edit(${start+i})">✏️</button>
                <button class="btn-delete" onclick="del(${start+i})">🗑</button>
            </td>
        </tr>`;
    });

    let total = totalPages(filtered.length);

    if(page > total) page = total;

    document.getElementById("pageInfo").innerText =
        "Página " + page + " de " + total;
}

/* PAGINACIÓN */
function nextPage(){
    let filtered = getFilteredData();
    if(page < totalPages(filtered.length)){
        page++;
        render();
    }
}

function prevPage(){
    if(page > 1){
        page--;
        render();
    }
}

function firstPage(){
    page = 1;
    render();
}

function lastPage(){
    let filtered = getFilteredData();
    page = totalPages(filtered.length);
    render();
}

/* FILAS */
document.getElementById("rows").addEventListener("change", e=>{
    rows = parseInt(e.target.value);
    page = 1;
    render();
});

/* BUSCAR */
document.getElementById("search").addEventListener("input", ()=>{
    page = 1;
    render();
});

/* MODAL */
function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
    clear();
}

function clear(){
    document.getElementById("nombreProveedor").value="";
    document.getElementById("ApellidosProveedor").value="";
    document.getElementById("Correo").value="";
    document.getElementById("Telefono").value="";
    editIndex = null;
}

/* GUARDAR */
function save(){
    let obj = {
        nombreProveedor: document.getElementById("nombreProveedor").value,
        apellidosProveedor: document.getElementById("ApellidosProveedor").value,
        correo: document.getElementById("Correo").value,
        telefono: document.getElementById("Telefono").value
    };

    if(editIndex !== null){
        data[editIndex] = obj;
    }else{
        data.push(obj);
    }

    persist();
    closeModal();
    render();
}

/* EDITAR */
function edit(i){
    let d = data[i];

    document.getElementById("nombreProveedor").value = d.nombreProveedor;
    document.getElementById("ApellidosProveedor").value = d.apellidosProveedor;
    document.getElementById("Correo").value = d.correo;
    document.getElementById("Telefono").value = d.telefono;

    editIndex = i;
    openModal();
}

/* ELIMINAR */
function del(i){
    if(confirm("¿Eliminar proveedor?")){
        data.splice(i,1);
        persist();
        render();
    }
}

render();
</script>

</body>
</html>
